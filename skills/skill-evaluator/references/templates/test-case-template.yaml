# 用例定义模板

每个用例包含以下字段：

```yaml
# ===== 基本信息 =====
id: "logic-cpu-01"                    # 唯一标识
type: "positive"                       # positive / negative
scenario: "core-logic"                 # trigger / core-logic / output-quality / error-handling
description: "单用例仅CPU指标分析"       # 用例描述

# ===== 输入 =====
prompt: "分析用例134263"               # 发送给 Agent 的提示词

# ===== 上下文（可选）=====
context:
  task_group: "test_cpu"               # 用例分组
  test_data_id: "1258797"              # 关联的测试数据 ID
  prerequisites: []                    # 前置条件

# ===== 预期行为 =====
expected_behavior:

  # 触发场景
  trigger: true                        # 是否应触发该 Skill

  # 核心逻辑场景
  tool_calls:                          # 预期工具调用序列
    - name: "mcp"
      params:
        contains: "tperf-mcp"
      order: 1
    - name: "read_file"
      params:
        path_contains: "cpu"
      order: 2

  # 产物质量场景
  outputs:
    file_exists:                       # 应在的文件
      - "report.md"
      - "cpu.json"
    response_contains:                 # 响应应包含的关键内容
      - "测试有效"
      - "出现CPU瓶颈"
      - "业务QPS平稳"
    response_not_contains:             # 响应不应包含的内容（幻觉检测）
      - "GPU使用率"
      - "api_key"

  # 异常容错场景
  error_handling:
    on_invalid_id: "告知'不存在'，不编造结果"
    on_missing_param: "主动追问必要信息"
    on_tool_failure: "优雅降级提示，不无限重试"

# ===== 评分规则 =====
scoring:
  critical: true                       # 是否为关键判定
  max_deduction: 80                    # 最大扣分
  sub_checks:                          # 子检查项
    - name: "工具调用顺序"
      max_deduction: 10
      method: "lcs"                    # lcs / exact / contains / regex
    - name: "产物完整性"
      max_deduction: 10
      method: "file_exists"
    - name: "报告质量"
      max_deduction: 20
      method: "rubric"

# ===== 基线信息 =====
baseline:
  type: "session"                      # session / snapshot / manual
  session_id: ""                       # 基线会话 ID（如有）
  message_id: ""                       # 基线消息 ID（如有）
  confirmed_by: ""                     # 确认人
  confirmed_at: ""                     # 确认时间

# ===== 元信息 =====
meta:
  priority: "P0"                       # P0 / P1 / P2
  stability_trials: 5                  # 稳定性测试执行次数
  created_at: ""
  updated_at: ""
  source: "manual"                     # manual / bad_case / regression
```

## 场景模板速查

### 触发用例

```yaml
# 正向：各种表述都能触发
- id: "trigger-pos-01"
  type: "positive"
  scenario: "trigger"
  prompt: "分析用例134263"
  expected_behavior:
    trigger: true

# 负向：相似但不相关的 prompt 不误触发
- id: "trigger-neg-01"
  type: "negative"
  scenario: "trigger"
  prompt: "CPU高负载应该如何排查？"
  expected_behavior:
    trigger: false
```

### 核心逻辑用例

```yaml
# 关键分支覆盖
- id: "logic-cpu-01"
  type: "positive"
  scenario: "core-logic"
  prompt: "分析用例134263"
  expected_behavior:
    tool_calls:
      - name: "mcp"
        contains: "get_cpu_data"
  scoring:
    critical: true
    max_deduction: 80
```

### 产物质量用例

```yaml
- id: "output-pos-01"
  type: "positive"
  scenario: "output-quality"
  prompt: "分析用例134263，输出JSON格式报告"
  expected_behavior:
    outputs:
      file_exists: ["report.json"]
      file_valid_json: true
      response_not_contains: ["幻觉内容", "敏感信息"]
```

### 异常容错用例

```yaml
- id: "error-input-01"
  type: "negative"
  scenario: "error-handling"
  prompt: "分析用例99999999999"
  expected_behavior:
    error_handling:
      on_invalid_id: "告知不存在"
  scoring:
    critical: true
```
