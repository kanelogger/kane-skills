# 评分配置模板

## 通用评分框架

```yaml
# ===== 全局配置 =====
scoring:
  method: "deduction"         # 扣分制
  initial_score: 100
  min_score: 0
  pass_threshold: 80          # 达标线

# ===== 评分维度 =====
dimensions:

  # --- 确定性评分维度 ---
  - id: "tool_calls"
    name: "工具调用"
    type: "deterministic"
    max_deduction: 10
    rules:
      - name: "调用序列一致性"
        method: "lcs"          # lcs / exact / sequence
        deduction_per_mismatch: 2
        normalize:
          - "replace_timestamps"
          - "ignore_search_params"
          - "ignore_write_content"
      - name: "必需工具是否调用"
        method: "contains"
        required_tools: ["mcp", "read_file"]
        deduction_per_missing: 5

  - id: "outputs"
    name: "产物检查"
    type: "deterministic"
    max_deduction: 10
    rules:
      - name: "文件存在"
        method: "file_exists"
        required_files: ["report.md"]
        deduction_per_missing: 5
      - name: "关键内容"
        method: "response_contains"
        required_phrases: ["测试有效", "CPU瓶颈"]
        deduction_per_missing: 2

  - id: "efficiency"
    name: "效率"
    type: "deterministic"
    max_deduction: 10
    rules:
      - name: "耗时"
        method: "threshold"
        baseline_seconds: 300
        deduction_per_10_percent_over: 1
        max_deduction: 5
      - name: "Token 消耗"
        method: "threshold"
        baseline_tokens: null      # 从基线自动获取
        deduction_per_10_percent_over: 1
        max_deduction: 5

  - id: "stability"
    name: "稳定性"
    type: "deterministic"
    trials: 5
    tolerance: "zero"              # zero / 10_percent / 40_percent
    rule: "all_trials_must_pass"   # 任一不达标 → 用例 0 分

  # --- Rubric 评分维度 ---
  - id: "report_quality"
    name: "报告质量"
    type: "rubric"
    max_deduction: 80
    critical_items:                # 关键判定项
      - name: "压测有效性判定"
        deduction: 80              # 不一致直接扣
      - name: "性能结果判定"
        deduction: 80
    non_critical_items:            # 非关键项
      - name: "CPU分析"
        deduction_per_diff: 5
      - name: "内存分析"
        deduction_per_diff: 5
      - name: "网络分析"
        deduction_per_diff: 5
      - name: "磁盘IO分析"
        deduction_per_diff: 5
      - name: "根因定位"
        deduction_per_diff: 5
      - name: "优化建议"
        deduction_per_diff: 5

# ===== 综合评分公式 =====
formula:
  single_trial: "max(0, 100 + sum(all_deductions))"
  trial_pass: "trial_score >= pass_threshold"
  case_score: |
    if all trials pass:
      avg(all trial_scores)
    else:
      0

# ===== 一致性判断标准 =====
consistency:
  numeric:
    type: "relative_error"
    tolerance: 0.01          # 1% 相对误差
  categorical:
    type: "exact"
  advisory:
    type: "direction_match"  # 核心方向一致即可
```

## 评分示例

| 用例 | Trial 1 | Trial 2 | Trial 3 | 全部达标？ | 用例总分 |
|---|---|---|---|---|---|
| cpu-01 | 95 | 92 | 88 | ✅ 全部 ≥ 80 | **91.7** |
| cpu-02 | 90 | 75 | 93 | ❌ Trial 2 < 80 | **0** |
| nic-01 | 100 | 100 | 98 | ✅ 全部 ≥ 80 | **99.3** |
| disk-01 | 85 | 82 | 80 | ✅ 全部 ≥ 80 | **82.3** |

## 调试提示

- **0% pass^N**：先检查任务定义/用例描述是否有歧义、评分器配置是否错误、成功标准是否不合理，而不是先怀疑 Agent 能力
- **100% pass^N 但怀疑漏测**：检查负向用例覆盖、边界条件、异常容错
- **Trial 间分数波动大**：检查是否是非确定性任务、评委模型是否稳定、是否需要增加 Trial 次数
